<!DOCTYPE html>
<html>
<head>
  <title>Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
  .container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

input {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 10px;
  box-sizing: border-box;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 16px;
  cursor: pointer;
}

h2 {
  text-align: center;
}
  </style>
</head>
<body>
<body>
<div class="container">

<h2>Status verificare</h2>
<p id="status">Se verifică...</p>

<script>
const url = new URL(window.location.href);
const id = url.searchParams.get("id");

async function verifica() {
  const res = await fetch("/status/" + id);
  const data = await res.json();
  
  if (data.codeError) {
  document.getElementById("errorMsg").innerText = "Cod invalid";
}

  if (data.status === "pending") {
    document.getElementById("status").innerText = "Se verifică...";
  }

  if (data.status === "rejected") {
    document.getElementById("status").innerText = "Date incorecte";
  }

  if (data.status === "approved") {
    document.getElementById("status").innerText = "Verificat";
  }
}

setInterval(verifica, 3000);
</script>
</div>
</body>
</html>
